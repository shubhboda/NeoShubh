<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Access</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: linear-gradient(135deg, #059669 0%, #047857 100%);
      }
      .container {
        text-align: center;
        color: white;
      }
      h1 {
        margin: 0 0 10px 0;
        font-size: 24px;
      }
      p {
        margin: 0;
        font-size: 14px;
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🔓 Admin Access Granted</h1>
      <p>Redirecting to main app...</p>
    </div>
    <script>
      // Admin gate: open this file to unlock admin panel
      // Store unlock in both session and local storage for reliability.
      try {
        sessionStorage.setItem("ayurveda_admin", "1");
        localStorage.setItem("ayurveda_admin", "1");
        console.log("Admin flag set successfully");
      } catch (e) {
        console.error("Failed to set admin flag:", e);
      }
      
      // Small delay to ensure sessionStorage is persisted, then redirect
      setTimeout(() => {
        window.location.replace("/");
      }, 100);
    </script>
  </body>
</html>
